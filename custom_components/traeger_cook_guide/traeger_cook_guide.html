<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Traeger Cook Guide</title>
<style>
:root{
  --bg:#ffffff;--bg2:#f2f2f0;--bg3:#e8e8e6;
  --text:#1a1a1a;--text2:#666;--text3:#aaa;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.15);
  --rad:10px;--rad-lg:14px;
  --green-bg:#EAF3DE;--green-text:#3B6D11;--green-border:#97C459;
  --blue-bg:#E6F1FB;--blue-text:#185FA5;--blue-border:#85B7EB;
  --amber-bg:#FAEEDA;--amber-text:#854F0B;--amber-border:#EF9F27;
  --red-bg:#FAECE7;--red-text:#993C1D;--red-border:#E24B4A;
  --success:#1D9E75;--danger:#E24B4A;--accent:#03a9f4;
  --custom-bg:#EEEDFE;--custom-text:#3C3489;--custom-border:#AFA9EC;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
  --text:#f5f5f5;--text2:#aaa;--text3:#666;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --green-bg:#1a2e10;--green-text:#97C459;--green-border:#3B6D11;
  --blue-bg:#0c2240;--blue-text:#85B7EB;--blue-border:#185FA5;
  --amber-bg:#2e1f05;--amber-text:#FAC775;--amber-border:#854F0B;
  --red-bg:#2e1008;--red-text:#F09595;--red-border:#993C1D;
  --custom-bg:#26215C;--custom-text:#AFA9EC;--custom-border:#534AB7;
}}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:14px;padding:12px;max-width:560px;margin:0 auto;}

/* ── Header ── */
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
h1{font-size:15px;font-weight:600;display:flex;align-items:center;gap:5px;flex-shrink:0;}
.live{font-size:10px;padding:1px 6px;background:var(--danger);color:#fff;border-radius:10px;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.ha-chip{font-size:10px;padding:3px 8px;border-radius:20px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;white-space:nowrap;}
.ha-chip.ok{border-color:var(--green-border);background:var(--green-bg);color:var(--green-text);}
.ha-chip.err{border-color:var(--red-border);background:var(--red-bg);color:var(--red-text);}
.hdr-right{display:flex;align-items:center;gap:4px;flex-wrap:nowrap;overflow:hidden;}
.hdr-pill{font-size:10px;padding:3px 8px;border-radius:20px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);white-space:nowrap;flex-shrink:0;}
.hdr-pill.ok{border-color:var(--green-border);background:var(--green-bg);color:var(--green-text);}
.hdr-pill.bad{border-color:var(--red-border);background:var(--red-bg);color:var(--red-text);}
.hdr-pill.charging{border-color:var(--blue-border);background:var(--blue-bg);color:var(--blue-text);}

/* ── Device status — 3 col grid, wraps ── */
.dev-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:10px;}
.dpill{display:flex;flex-direction:column;gap:1px;padding:7px 9px;border-radius:var(--rad);border:1px solid var(--border2);background:var(--bg2);}
.dpill.ok{background:var(--green-bg);border-color:var(--green-border);}
.dpill.warn{background:var(--amber-bg);border-color:var(--amber-border);}
.dpill.bad{background:var(--red-bg);border-color:var(--red-border);}
.dpill.charging{background:var(--blue-bg);border-color:var(--blue-border);}
.dpill-label{font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);}
.dpill.ok .dpill-label{color:var(--green-text);opacity:.7;}
.dpill.warn .dpill-label{color:var(--amber-text);opacity:.7;}
.dpill.bad .dpill-label{color:var(--red-text);opacity:.7;}
.dpill.charging .dpill-label{color:var(--blue-text);opacity:.7;}
.dpill-val{font-size:13px;font-weight:600;color:var(--text);}
.dpill.ok .dpill-val{color:var(--green-text);}
.dpill.warn .dpill-val{color:var(--amber-text);}
.dpill.bad .dpill-val{color:var(--red-text);}
.dpill.charging .dpill-val{color:var(--blue-text);}

/* ── Probe cards ── */
.probes{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.pc{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rad-lg);padding:10px 12px;position:relative;}
.pc.p1{border-left:3px solid var(--green-border);}
.pc.p2{border-left:3px solid var(--blue-border);}
.pc-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:4px;}
.pc-food{font-size:13px;font-weight:600;line-height:1.3;padding-right:28px;}
.pc-detail{font-size:10px;color:var(--text2);margin-top:1px;}
.pc-temp{font-size:22px;font-weight:700;color:var(--accent);margin:4px 0 1px;line-height:1.1;}
.pc-stat{font-size:11px;margin-top:2px;}
.st-warn{color:#BA7517;font-weight:600;}
.st-done{color:var(--success);font-weight:600;}
.pc-bar{height:3px;background:var(--bg3);border-radius:2px;margin-top:6px;overflow:hidden;}
.pc-fill{height:3px;border-radius:2px;background:var(--success);transition:width .8s;}
.pc-fill.warm{background:#EF9F27;}
.pc-fill.hot{background:var(--danger);}
.pc-empty{font-size:12px;color:var(--text3);font-style:italic;}
.pc-clear{position:absolute;top:8px;right:10px;font-size:13px;color:var(--danger);background:none;border:none;cursor:pointer;padding:2px;line-height:1;}

/* ── Search ── */
.search-wrap{position:relative;margin-bottom:8px;}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--text3);fill:none;pointer-events:none;}
input[type=text]{width:100%;padding:9px 10px 9px 32px;font-size:14px;font-family:inherit;border:1px solid var(--border2);border-radius:var(--rad);background:var(--bg2);color:var(--text);outline:none;-webkit-appearance:none;}
input[type=text]:focus{border-color:var(--accent);background:var(--bg);}
input[type=number],select{font-family:inherit;font-size:13px;border:1px solid var(--border2);border-radius:var(--rad);background:var(--bg2);color:var(--text);outline:none;padding:7px 10px;width:100%;-webkit-appearance:none;}

/* ── Chips — wrap ── */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.chip{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);user-select:none;-webkit-tap-highlight-color:transparent;}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.chip.custom-chip{border-color:var(--custom-border);color:var(--custom-text);background:var(--custom-bg);}
.chip.custom-chip.active{background:var(--custom-text);color:#fff;}

/* ── Food list — no table, pure rows ── */
.sec-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin:12px 0 5px;padding-left:2px;}
.food-list{display:flex;flex-direction:column;gap:2px;}

.food-row{display:flex;align-items:center;gap:10px;padding:10px 10px;border-radius:var(--rad);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .1s;}
.food-row:active{background:var(--bg2);}
.food-row.sel-p1{background:var(--green-bg);}
.food-row.sel-p2{background:var(--blue-bg);}
.food-row.is-open{background:var(--bg2);border-radius:var(--rad) var(--rad) 0 0;}
.food-row.sel-p1.is-open{background:var(--green-bg);}
.food-row.sel-p2.is-open{background:var(--blue-bg);}
.food-row.custom-row{border-left:2px solid var(--custom-border);padding-left:8px;}

/* Food name — takes all space */
.fn{flex:1;min-width:0;}
.fn-name{font-size:14px;font-weight:500;line-height:1.3;}
.fn-tip{font-size:11px;color:var(--text3);margin-top:1px;}

/* P1/P2 buttons — always visible, right side */
.abtns{display:flex;gap:5px;flex-shrink:0;}
.abtn{padding:6px 12px;font-size:12px;font-weight:600;border:1px solid var(--border2);border-radius:8px;cursor:pointer;background:var(--bg2);color:var(--text2);-webkit-tap-highlight-color:transparent;white-space:nowrap;}
.abtn.p1a{background:var(--green-bg);color:var(--green-text);border-color:var(--green-border);}
.abtn.p2a{background:var(--blue-bg);color:var(--blue-text);border-color:var(--blue-border);}
.del-btn{padding:5px 8px;font-size:12px;border:1px solid rgba(226,75,74,.2);border-radius:8px;cursor:pointer;background:none;color:var(--danger);}

/* Expand detail — shows on tap */
.food-detail{display:none;background:var(--bg2);border-radius:0 0 var(--rad) var(--rad);padding:10px 12px 12px;border-top:1px solid var(--border);}
.food-detail.open{display:block;}
.det-row{display:flex;gap:12px;margin-bottom:4px;}
.det-item{flex:1;}
.det-item .dl{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:2px;}
.det-item .dv{font-size:14px;font-weight:600;}
.det-tip{font-size:12px;color:var(--text2);font-style:italic;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}

.no-results{text-align:center;color:var(--text3);padding:2rem;font-size:14px;}

/* ── Custom builder ── */
.add-section{margin-top:16px;padding-top:14px;border-top:1px solid var(--border2);}
.add-toggle{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:500;cursor:pointer;user-select:none;padding:4px 0;-webkit-tap-highlight-color:transparent;}
.add-toggle .ch{font-size:12px;color:var(--text3);transition:transform .2s;margin-left:auto;}
.add-toggle.open .ch{transform:rotate(180deg);}
.add-body{display:none;margin-top:10px;}
.add-body.open{display:block;}
.add-form{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rad-lg);padding:14px;}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.fgrid .full{grid-column:1/-1;}
.field{display:flex;flex-direction:column;gap:4px;}
.field label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);}
.fbottom{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;}
.field.grow{flex:1;min-width:160px;}
.add-btn{padding:9px 18px;font-size:14px;font-weight:600;border:none;border-radius:var(--rad);background:var(--accent);color:#fff;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
.form-hint{font-size:11px;color:var(--text3);margin-top:6px;}
.cl-hdr{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin:12px 0 5px;}
.ci{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--rad);border:1px solid var(--border);background:var(--bg);margin-bottom:4px;}
.ci-info{flex:1;font-size:12px;}
.ci-name{font-weight:600;}
.ci-meta{font-size:11px;color:var(--text2);margin-top:1px;}
.ci-del{padding:4px 10px;font-size:11px;border:1px solid rgba(226,75,74,.2);border-radius:6px;cursor:pointer;background:none;color:var(--danger);}
.empty-c{font-size:12px;color:var(--text3);font-style:italic;padding:6px 0;}

/* ── Toast ── */
#toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(10px);background:#1a1a1a;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:999;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast.warn{background:#BA7517;}
#toast.err{background:var(--danger);}
</style>
</head>
<body>

<!-- Header row: title + probe charging + HA chip -->
<div class="hdr">
  <h1>🔥 Traeger <span id="live-badge" class="live" style="display:none;">LIVE</span></h1>
  <div class="hdr-right">
    <div class="hdr-pill" id="ds-chrg">Probes: <span id="ds-chrg-v">—</span></div>
    <span id="ha-chip" class="ha-chip err" onclick="promptToken()">HA: connecting…</span>
  </div>
</div>

<!-- Device grid 3-col:
     Row 1: Connection | P1 Temp | P1 Battery
     Row 2: Base Battery | P2 Temp | P2 Battery -->
<div class="dev-grid">
  <div class="dpill" id="ds-conn">
    <div class="dpill-label">Connection</div>
    <div class="dpill-val" id="ds-conn-v">—</div>
  </div>
  <div class="dpill" id="ds-p1t">
    <div class="dpill-label">P1 temp</div>
    <div class="dpill-val" id="ds-p1t-v">—</div>
  </div>
  <div class="dpill" id="ds-p1b">
    <div class="dpill-label">P1 battery</div>
    <div class="dpill-val" id="ds-p1b-v">—</div>
  </div>
  <div class="dpill" id="ds-base">
    <div class="dpill-label">Base battery</div>
    <div class="dpill-val" id="ds-base-v">—</div>
  </div>
  <div class="dpill" id="ds-p2t">
    <div class="dpill-label">P2 temp</div>
    <div class="dpill-val" id="ds-p2t-v">—</div>
  </div>
  <div class="dpill" id="ds-p2b">
    <div class="dpill-label">P2 battery</div>
    <div class="dpill-val" id="ds-p2b-v">—</div>
  </div>
</div>

<!-- Probe cards -->
<div class="probes">
  <div class="pc p1">
    <div class="pc-lbl">Probe 1</div>
    <div id="p1-food" class="pc-empty">No food assigned</div>
    <div id="p1-temp" class="pc-temp" style="display:none;"></div>
    <div id="p1-stat" class="pc-stat"></div>
    <div class="pc-bar" id="p1-bw" style="display:none;"><div id="p1-bar" class="pc-fill" style="width:0%"></div></div>
    <button id="p1-clr" class="pc-clear" style="display:none;" onclick="clearProbe(1)">✕</button>
  </div>
  <div class="pc p2">
    <div class="pc-lbl">Probe 2</div>
    <div id="p2-food" class="pc-empty">No food assigned</div>
    <div id="p2-temp" class="pc-temp" style="display:none;"></div>
    <div id="p2-stat" class="pc-stat"></div>
    <div class="pc-bar" id="p2-bw" style="display:none;"><div id="p2-bar" class="pc-fill" style="width:0%"></div></div>
    <button id="p2-clr" class="pc-clear" style="display:none;" onclick="clearProbe(2)">✕</button>
  </div>
</div>

<!-- Search -->
<div class="search-wrap">
  <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  <input type="text" id="search" placeholder="Search food…">
</div>

<!-- Chips -->
<div class="chips" id="chips"></div>

<!-- Food list -->
<div id="output"></div>

<!-- Custom builder -->
<div class="add-section">
  <div class="add-toggle" id="add-toggle" onclick="toggleAdd()">
    ➕ Add custom food
    <span class="ch">▾</span>
  </div>
  <div class="add-body" id="add-body">
    <div class="add-form">
      <div class="fgrid">
        <div class="field full">
          <label>Food name *</label>
          <input type="text" id="cf-name" placeholder="e.g. Wagyu brisket" maxlength="60">
        </div>
        <div class="field">
          <label>Category *</label>
          <select id="cf-cat">
            <option value="">— pick —</option>
            <option>Beef</option><option>Pork</option><option>Poultry</option>
            <option>Seafood</option><option>Lamb</option><option>Vegetables</option>
            <option>Sides &amp; Extras</option><option>Desserts &amp; Bread</option>
            <option>Custom</option>
          </select>
        </div>
        <div class="field">
          <label>Smoker temp (°F) *</label>
          <input type="number" id="cf-smoke" placeholder="225" min="100" max="600">
        </div>
        <div class="field">
          <label>Temp max (opt)</label>
          <input type="number" id="cf-smoke-max" placeholder="250" min="100" max="600">
        </div>
        <div class="field">
          <label>Cook time</label>
          <input type="text" id="cf-time" placeholder="10–14 hrs" maxlength="30">
        </div>
        <div class="field">
          <label>Internal target (°F)</label>
          <input type="number" id="cf-target" placeholder="203" min="80" max="250">
        </div>
      </div>
      <div class="fbottom">
        <div class="field grow">
          <label>Tip / notes</label>
          <input type="text" id="cf-tip" placeholder="e.g. Wrap at 165°F" maxlength="80">
        </div>
        <button class="add-btn" onclick="addCustom()">Add</button>
      </div>
      <div class="form-hint">* Required. Target temp wires directly to your probe in HA.</div>
    </div>
    <div class="cl-hdr">Saved custom entries</div>
    <div id="custom-list"></div>
  </div>
</div>

<div id="toast"></div>

<script>

const ENT={
  p1T:"sensor.bt_proxy_hopepop_probe_1_temp",
  p2T:"sensor.bt_proxy_hopepop_probe_2_temp",
  p1M:"input_select.probe_1_meat_type",
  p2M:"input_select.probe_2_meat_type",
  p1N:"input_number.probe_1_target_temp",
  p2N:"input_number.probe_2_target_temp",
  p1A:"input_boolean.probe_1_alert_sent",
  p2A:"input_boolean.probe_2_alert_sent",
  conn:"binary_sensor.bt_proxy_hopepop_connected",
  chrg:"binary_sensor.bt_proxy_hopepop_probes_charging",
  base:"sensor.bt_proxy_hopepop_base_battery",
  p1B:"sensor.bt_proxy_hopepop_probe_1_battery",
  p2B:"sensor.bt_proxy_hopepop_probe_2_battery",
};

let haWs=null,haOk=false,haToken=null,msgId=1,states={};
let p1Item=null,p2Item=null,activeCat="All",query="",openIdx=null;
let customFoods=[],_reg=[];
const LS_KEY="traeger_custom_v2";

// ── PERMANENT TOKEN ────────────────────────────────────
// Leave empty to be prompted once per browser.
// Paste token here to skip prompt on ALL devices:
const HA_TOKEN="";
// ──────────────────────────────────────────────────────

function loadCustom(){try{customFoods=JSON.parse(localStorage.getItem(LS_KEY))||[];}catch{customFoods=[];}}
function saveCustom(){localStorage.setItem(LS_KEY,JSON.stringify(customFoods));}

function connectHA(){
  const proto=location.protocol==="https:"?"wss":"ws";
  const host=location.hostname;
  const port=location.port||(proto==="wss"?"443":"8123");
  console.debug("[Traeger] WS:",`${proto}://${host}:${port}/api/websocket`);
  try{haWs=new WebSocket(`${proto}://${host}:${port}/api/websocket`);}catch(e){return;}
  haWs.onmessage=e=>{
    const m=JSON.parse(e.data);
    if(m.type==="auth_required"){
      const t=HA_TOKEN||localStorage.getItem("ha_token");
      if(t){haToken=t;haWs.send(JSON.stringify({type:"auth",access_token:t}));}
      else promptToken();
    }else if(m.type==="auth_ok"){
      haOk=true;setChip(true);
      document.getElementById("live-badge").style.display="inline";
      haWs.send(JSON.stringify({id:msgId++,type:"get_states"}));
      haWs.send(JSON.stringify({id:msgId++,type:"subscribe_events",event_type:"state_changed"}));
    }else if(m.type==="auth_invalid"){
      localStorage.removeItem("ha_token");setChip(false,"auth failed — tap to retry");
    }else if(m.type==="event"&&m.event?.event_type==="state_changed"){
      const nd=m.event.data.new_state;
      if(nd){states[nd.entity_id]=nd.state;refresh();}
    }else if(m.type==="result"&&Array.isArray(m.result)){
      m.result.forEach(s=>{states[s.entity_id]=s.state;});refresh();
    }
  };
  haWs.onclose=()=>{haOk=false;document.getElementById("live-badge").style.display="none";setChip(false,"HA disconnected");setTimeout(connectHA,6000);};
  haWs.onerror=()=>haWs.close();
}

function setChip(ok,msg){
  const el=document.getElementById("ha-chip");
  el.className="ha-chip "+(ok?"ok":"err");
  el.textContent=ok?"HA: connected":(msg||"HA: disconnected");
  el.onclick=ok?null:promptToken;
}

function promptToken(){
  const t=prompt("Paste your HA Long-Lived Access Token\n(Profile → Long-Lived Access Tokens → Create Token)\n\nSaved automatically — asked once per browser.");
  if(!t||!t.trim())return;
  const c=t.trim();
  localStorage.setItem("ha_token",c);haToken=c;
  showToast("Token saved — connecting…");
  if(haWs)haWs.close();
  connectHA();
}

function svc(domain,service,target,data){
  if(!haOk)return;
  haWs.send(JSON.stringify({id:msgId++,type:"call_service",domain,service,target:{entity_id:target},service_data:data||{}}));
}

function assign(item,probe){
  if(probe===1)p1Item=item;else p2Item=item;
  if(haOk){
    svc("input_select","select_option",probe===1?ENT.p1M:ENT.p2M,{option:item.haType||"None"});
    if(item.target)svc("input_number","set_value",probe===1?ENT.p1N:ENT.p2N,{value:item.target});
    svc("input_boolean","turn_off",probe===1?ENT.p1A:ENT.p2A,{});
    showToast(`P${probe} → ${item.name}${item.target?" ("+item.target+"°F)":""}`);
  }else showToast(`P${probe} → ${item.name} (HA offline)`,"warn");
  refresh();render();
}

function clearProbe(probe){
  if(probe===1){p1Item=null;svc("input_select","select_option",ENT.p1M,{option:"None"});}
  else{p2Item=null;svc("input_select","select_option",ENT.p2M,{option:"None"});}
  refresh();render();
}

window.assignFromIdx=function(idx,probe){const item=_reg[idx];if(item)assign(item,probe);};

function refresh(){updateProbes();updateDevice();}

function updateDevice(){
  const conn=states[ENT.conn];
  const chrg=states[ENT.chrg];
  const base=parseFloat(states[ENT.base]);
  const p1b=parseFloat(states[ENT.p1B]);
  const p2b=parseFloat(states[ENT.p2B]);
  const p1t=parseFloat(states[ENT.p1T]);
  const p2t=parseFloat(states[ENT.p2T]);

  function bc(p){return p>=60?"ok":p>=30?"warn":"bad";}

  // Connection — grid dpill
  const ce=document.getElementById("ds-conn");
  const cev=document.getElementById("ds-conn-v");
  if(conn!==undefined){cev.textContent=conn==="on"?"Connected":"Disconnected";ce.className="dpill "+(conn==="on"?"ok":"bad");}

  // Probe charging — header pill
  const che=document.getElementById("ds-chrg");
  const chev=document.getElementById("ds-chrg-v");
  if(chrg!==undefined){chev.textContent=chrg==="on"?"Charging":"Not charging";che.className="hdr-pill "+(chrg==="on"?"charging":"");}

  // Batteries
  function setBat(pillId,valId,label,pct){
    const pill=document.getElementById(pillId);
    const val=document.getElementById(valId);
    if(!isNaN(pct)){val.textContent=Math.round(pct)+"%";pill.className="dpill "+bc(pct);}
  }
  setBat("ds-base","ds-base-v","Base",base);
  setBat("ds-p1b","ds-p1b-v","P1",p1b);
  setBat("ds-p2b","ds-p2b-v","P2",p2b);

  // Probe temps in device bar
  const p1tp=document.getElementById("ds-p1t");
  const p1tv=document.getElementById("ds-p1t-v");
  if(!isNaN(p1t)){p1tv.textContent=Math.round(p1t)+"°F";p1tp.className="dpill";}

  const p2tp=document.getElementById("ds-p2t");
  const p2tv=document.getElementById("ds-p2t-v");
  if(!isNaN(p2t)){p2tv.textContent=Math.round(p2t)+"°F";p2tp.className="dpill";}
}

function updateProbes(){
  updateOneProbe(1,p1Item,ENT.p1T,ENT.p1N);
  updateOneProbe(2,p2Item,ENT.p2T,ENT.p2N);
}

function updateOneProbe(n,item,tEnt,nEnt){
  const fEl=document.getElementById(`p${n}-food`);
  const tEl=document.getElementById(`p${n}-temp`);
  const sEl=document.getElementById(`p${n}-stat`);
  const bw=document.getElementById(`p${n}-bw`);
  const bar=document.getElementById(`p${n}-bar`);
  const clr=document.getElementById(`p${n}-clr`);
  const cur=parseFloat(states[tEnt])||null;
  const tgt=item?item.target:null;
  if(!item){
    fEl.className="pc-empty";fEl.textContent="No food assigned";
    tEl.style.display="none";sEl.textContent="";bw.style.display="none";clr.style.display="none";return;
  }
  fEl.className="pc-food";
  fEl.innerHTML=`${item.name}<div class="pc-detail">${item.smoke} · ${item.time}</div>`;
  clr.style.display="block";
  if(cur!==null){tEl.style.display="block";tEl.textContent=Math.round(cur)+"°F";}else tEl.style.display="none";
  if(tgt&&cur!==null){
    bw.style.display="block";
    const pct=Math.min(100,Math.round(((cur-32)/(tgt-32))*100));
    bar.style.width=pct+"%";
    bar.className="pc-fill"+(pct>90?" hot":pct>75?" warm":"");
    const rem=tgt-cur;
    if(rem<=0)sEl.innerHTML=`<span class="st-done">✓ Ready to pull!</span>`;
    else if(rem<=10)sEl.innerHTML=`<span class="st-warn">⚠ ${Math.round(rem)}°F to go!</span>`;
    else{sEl.textContent=`${Math.round(rem)}°F from target (${tgt}°F)`;sEl.className="pc-stat";}
  }else if(tgt){bw.style.display="none";sEl.textContent=`Target: ${tgt}°F`;}
  else{bw.style.display="none";sEl.textContent="No temp target";}
}

function tc(s){const v=parseInt(s.replace(/[^\d]/,""));return v>=375?"badge-hot":v>=250?"badge-med":"badge-low";}

function buildMerged(){
  if(!customFoods.length)return COOK_DATA;
  const m=COOK_DATA.map(s=>({...s,items:[...s.items]}));
  customFoods.forEach(cf=>{
    const sec=m.find(s=>s.cat===cf.cat);
    if(sec)sec.items.push(cf);
    else{const ex=m.find(s=>s.cat==="Custom");if(ex)ex.items.push(cf);else m.push({cat:"Custom",items:[cf]});}
  });
  return m;
}

function render(){
  _reg=[];
  const all=buildMerged();
  let html="",total=0;
  all.forEach(sec=>{
    if(activeCat!=="All"&&activeCat!==sec.cat)return;
    const items=sec.items.filter(i=>!query||i.name.toLowerCase().includes(query)||sec.cat.toLowerCase().includes(query));
    if(!items.length)return;
    total+=items.length;
    html+=`<div class="sec-label">${sec.cat}</div><div class="food-list">`;
    items.forEach(item=>{
      const isP1=p1Item&&p1Item.name===item.name;
      const isP2=p2Item&&p2Item.name===item.name;
      const idx=_reg.length;_reg.push(item);
      const isOpen=openIdx===idx;
      const rc="food-row"+(item.custom?" custom-row":"")+(isP1?" sel-p1":isP2?" sel-p2":"")+(isOpen?" is-open":"");
      html+=`
      <div class="${rc}" id="fr-${idx}" onclick="toggleRow(${idx})">
        <div class="fn">
          <div class="fn-name">${item.name}${item.custom?'<span style="font-size:10px;margin-left:5px;padding:1px 5px;border-radius:5px;background:var(--custom-bg);color:var(--custom-text);">custom</span>':''}</div>
          ${item.tip?`<div class="fn-tip">${item.tip}</div>`:''}
        </div>
        <div class="abtns" onclick="event.stopPropagation()">
          <button class="abtn${isP1?" p1a":""}" onclick="assignFromIdx(${idx},1)">P1${isP1?" ✓":""}</button>
          <button class="abtn${isP2?" p2a":""}" onclick="assignFromIdx(${idx},2)">P2${isP2?" ✓":""}</button>
          ${item.custom?`<button class="del-btn" onclick="event.stopPropagation();deleteCustom(${item.id})">✕</button>`:''}
        </div>
      </div>
      <div class="food-detail${isOpen?" open":""}" id="fd-${idx}">
        <div class="det-row">
          <div class="det-item"><div class="dl">Smoker temp</div><div class="dv">${item.smoke}</div></div>
          <div class="det-item"><div class="dl">Cook time</div><div class="dv">${item.time}</div></div>
          <div class="det-item"><div class="dl">Internal temp</div><div class="dv">${item.internal}</div></div>
        </div>
        ${item.tip?`<div class="det-tip">💡 ${item.tip}</div>`:''}
      </div>`;
    });
    html+=`</div>`;
  });
  if(!total)html=`<div class="no-results">No results${query?' for "'+query+'"':""}</div>`;
  document.getElementById("output").innerHTML=html;
}

function toggleRow(idx){
  openIdx=openIdx===idx?null:idx;
  render();
}

function buildChips(){
  const el=document.getElementById("chips");
  const cats=["All",...COOK_DATA.map(d=>d.cat),...(customFoods.length?["Custom"]:[])];
  if(!cats.includes(activeCat))activeCat="All";
  el.innerHTML="";
  cats.forEach(c=>{
    const ch=document.createElement("button");
    ch.className="chip"+(c===activeCat?" active":"")+(c==="Custom"?" custom-chip":"");
    ch.textContent=c;
    ch.onclick=()=>{activeCat=c;document.querySelectorAll(".chip").forEach(x=>x.classList.remove("active"));ch.classList.add("active");openIdx=null;render();};
    el.appendChild(ch);
  });
}

function addCustom(){
  const name=document.getElementById("cf-name").value.trim();
  const cat=document.getElementById("cf-cat").value;
  const smokeMin=parseInt(document.getElementById("cf-smoke").value);
  const smokeMax=parseInt(document.getElementById("cf-smoke-max").value)||null;
  const time=document.getElementById("cf-time").value.trim()||"—";
  const target=parseInt(document.getElementById("cf-target").value)||null;
  const tip=document.getElementById("cf-tip").value.trim();
  if(!name){showToast("Food name required","err");return;}
  if(!cat){showToast("Pick a category","err");return;}
  if(!smokeMin||smokeMin<100){showToast("Enter a valid smoker temp","err");return;}
  const smokeStr=smokeMax&&smokeMax>smokeMin?`${smokeMin}–${smokeMax}°F`:`${smokeMin}°F`;
  const entry={id:Date.now(),name,cat,smoke:smokeStr,time,internal:target?`${target}°F`:"—",tip,target,haType:target?closestHaType(target):"None",custom:true};
  customFoods.push(entry);saveCustom();
  ["cf-name","cf-time","cf-tip"].forEach(id=>document.getElementById(id).value="");
  ["cf-smoke","cf-smoke-max","cf-target"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("cf-cat").value="";
  buildChips();renderCustomList();render();
  showToast(`"${name}" added`);
}

function deleteCustom(id){
  const e=customFoods.find(f=>f.id===id);
  if(!e||!confirm(`Delete "${e.name}"?`))return;
  customFoods=customFoods.filter(f=>f.id!==id);saveCustom();buildChips();renderCustomList();openIdx=null;render();
  showToast(`"${e.name}" deleted`,"warn");
}

function closestHaType(t){
  if(t>=200)return"Brisket";if(t>=190)return"Beef Ribs";if(t>=170)return"Chicken Well Done";
  if(t>=160)return"Beef Well Done";if(t>=150)return"Beef Medium Well";if(t>=145)return"Lean Fish";
  if(t>=140)return"Beef Medium";if(t>=133)return"Beef Medium Rare";if(t>=125)return"Beef Rare";
  return"None";
}

function renderCustomList(){
  const el=document.getElementById("custom-list");
  if(!customFoods.length){el.innerHTML='<div class="empty-c">No custom entries yet.</div>';return;}
  el.innerHTML=customFoods.map(f=>`
    <div class="ci">
      <div class="ci-info">
        <div class="ci-name">${f.name} <span style="font-size:11px;color:var(--text3);">· ${f.cat}</span></div>
        <div class="ci-meta">${f.smoke} · ${f.time} · ${f.internal}${f.tip?" · "+f.tip:""}</div>
      </div>
      <button class="ci-del" onclick="deleteCustom(${f.id})">✕ Delete</button>
    </div>`).join("");
}

function toggleAdd(){
  document.getElementById("add-toggle").classList.toggle("open");
  document.getElementById("add-body").classList.toggle("open");
}

let toastTimer;
function showToast(msg,type){
  const t=document.getElementById("toast");
  t.textContent=msg;t.className=type?"show "+type:"show";
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.className="",2600);
}

loadCustom();buildChips();renderCustomList();render();connectHA();
document.getElementById("search").oninput=e=>{query=e.target.value.toLowerCase();openIdx=null;render();};
setInterval(()=>{if(haOk)refresh();},5000);
</script>
